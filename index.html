<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rokkie - Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="video-background-container">
        <div class="video-main-background-container">
            <img src="img/background-img.png" alt="loading-img">
        </div>
        <video id="backgroundVideo" autoplay loop muted playsinline>
        </video>
        <div class="video-overlay"></div>
    </div>

    <div id="homePage" class="page active">
        <header>
            <h1>EchoVerse</h1>
        </header>
        <main>
            <ul id="songList" class="song-list">
                <li class="loading-songs">...</li> 
            </ul>
        </main>
    </div>

    <div id="songDetailPage" class="page">
        <button id="backToHomeFromDetailBtn" class="back-btn"><i class="fas fa-arrow-left"></i>Back/button>
        <div class="song-detail-container">
            <img id="detailAlbumArt" src="https://placehold.co/200x200/3a3a4e/e0e0e0?text=Art" alt="Album Art" class="detail-album-art">
            <h2 id="detailTrackTitle">.../h2>
            <p id="detailTrackArtist">...</p>
            <p id="detailAlbumName">...</p>
            <button id="playFromDetailBtn" class="play-from-detail-btn"><i class="fas fa-play-circle"></i> Play</button>
        </div>
    </div>

    <div id="playerPage" class="page">
        <button id="backToHomeBtn" class="back-btn"><i class="fas fa-arrow-left"></i>Back</button>
        <div class="music-player-container">
            <div class="music-player-box">
                <div class="player-header">
                    <img id="albumArt" src="https://placehold.co/100x100/3a3a4e/e0e0e0?text=Art" alt="Album Art" class="album-art-player">
                    <div class="track-info-player">
                        <h2 id="playerTrackTitle">...</h2>
                        <p id="playerTrackArtist">...</p>
                    </div>
                </div>

                <div id="lyricsContainer" class="lyrics-container">
                    <p>...</p>
                </div>

                <div class="player-controls">
                    <div class="progress-section-player">
                        <div id="playerProgressBarContainer" class="progress-bar-container-player">
                            <div id="playerProgressBar" class="progress-bar-player"></div>
                        </div>
                        <div class="time-display-player">
                            <span id="playerCurrentTime">0:00</span>
                            <span id="playerTotalDuration">0:00</span>
                        </div> 
                    </div>

                    <div class="main-controls-player">
                        <button id="playerPrevBtn" class="control-btn-player"><i class="fas fa-backward-step"></i></button>
                        <button id="playerPlayPauseBtn" class="control-btn-player play-pause-player"><i class="fas fa-play"></i></button>
                        <button id="playerNextBtn" class="control-btn-player"><i class="fas fa-forward-step"></i></button>
                    </div>

                    <div class="secondary-controls-player">
                        <button id="playerRepeatBtn" class="control-btn-player small-icon"><i class="fas fa-repeat"></i></button>
                        <button id="playerShuffleBtn" class="control-btn-player small-icon"><i class="fas fa-shuffle"></i></button>
                        <div class="volume-control-player">
                            <i class="control-volume-down volume-icon-player"></i>
                            <input type="range" id="playerVolumeSlider" class="volume-slider-player" min="0" max="1" step="0.01" value="0.8">
                            <i class="control-volume-up volume-icon-player ml-1"></i>
                        </div>
                        <div class="playback-speed-control">
                            <i class="control-tachometer-alt speed-icon"></i>
                            <input type="range" id="playerSpeedSlider" class="speed-slider" min="0.5" max="2.0" step="0.25" value="1.0">
                            <span id="currentSpeedDisplay">1.0x</span>
                        </div>
                    </div>
                </div>
                <p class="footer-credit">//code by: Rokkie</p>
            </div>
        </div>
    </div>

    
    <!-- Left Sidebar - Playlist -->
    <div class="left-sidebar">
        <div class="left-sidebar-content">
            <div class="search-section">
                <input type="text" id="searchInput" placeholder="Search music..." class="search-input">
            </div>
            <div class="playlist-header">
                
            </div>
            <div class="playlist-container">
                <ul id="playlistSongs" class="playlist-songs">
                    <li class="loading-songs">Loading...</li>
                </ul>
            </div>
        </div>
        <div class="left-sidebar-icon">♪</div>
    </div>

    <!-- Right Sidebar - Navigation -->
    <div class="right-sidebar">
        <div class="right-sidebar-icon">☰</div>
        <div class="right-sidebar-content">
            <div class="profile-section">
                <div class="profile-picture">
                    <video autoplay loop muted>
                        <source src="videos/background.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="username">Rokkie_or_Nath</div>
            </div>
            <div class="nav-items">
                <div class="nav-item active" data-page="home"><i class="fas fa-home"></i> Home</div>
                <div class="nav-item" data-page="profile"><i class="fas fa-user"></i> Profile</div>
                <div class="nav-item" data-page="settings"><i class="fas fa-cog"></i> Settings</div>
                <div class="nav-item" data-page="messages"><i class="fas fa-envelope"></i> Messages</div>
                <div class="nav-item" data-page="logout"><i class="fas fa-sign-out-alt"></i> Exit</div>
            </div>
        </div>
    </div>
    
    <div class="blur-background"></div>

    <audio id="audioPlayer"></audio>

    <script src="script.js"></script>
</body>
</html>
